<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Labs — Architecture Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
[data-theme="dark"]{
  --bg:#0a0e1a;--nav-bg:rgba(10,14,26,0.92);--border:rgba(255,255,255,0.07);--border-active:rgba(255,255,255,0.16);
  --text:#e8edf8;--text2:#7a85a8;--text3:#3e4660;--accent:#2563eb;--accent-soft:rgba(37,99,235,0.12);
  --tag-bg:rgba(255,255,255,0.05);
  /* diagram colors */
  --d-bg:#0d1120;--d-border:rgba(255,255,255,0.08);--d-text:#c8d0e8;--d-text2:#6b7599;
  --d-layer-users:#1a2640;--d-layer-edge:#121a2e;--d-layer-app:#0f1828;--d-layer-compute:#141c2e;
  --d-layer-msg:#111826;--d-layer-data:#101622;--d-layer-sec:#13182a;--d-layer-mon:#121820;
  --d-layer-cicd:#0e1520;--d-box:#1e2a42;--d-box-border:rgba(255,255,255,0.1);
  --d-accent:#2563eb;--d-teal:#14b8a6;--d-purple:#a78bfa;--d-amber:#f59e0b;--d-green:#4ade80;--d-coral:#f87171;--d-pink:#f472b6;
}
[data-theme="light"]{
  --bg:#f0f5fc;--nav-bg:rgba(240,245,252,0.92);--border:rgba(37,99,235,0.1);--border-active:rgba(37,99,235,0.28);
  --text:#0d1830;--text2:#3d5080;--text3:#8090b8;--accent:#2563eb;--accent-soft:rgba(37,99,235,0.07);
  --tag-bg:rgba(37,99,235,0.06);
  --d-bg:#f8faff;--d-border:rgba(37,99,235,0.12);--d-text:#1a2040;--d-text2:#5a6888;
  --d-layer-users:#e8f0ff;--d-layer-edge:#f0f4ff;--d-layer-app:#eef3ff;--d-layer-compute:#e8f2ff;
  --d-layer-msg:#f2f6ff;--d-layer-data:#edf2ff;--d-layer-sec:#eff3ff;--d-layer-mon:#eef3ff;
  --d-layer-cicd:#f0f5ff;--d-box:#ffffff;--d-box-border:rgba(37,99,235,0.15);
  --d-accent:#2563eb;--d-teal:#0d9488;--d-purple:#7c3aed;--d-amber:#d97706;--d-green:#16a34a;--d-coral:#dc2626;--d-pink:#db2777;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background var(--transition),color var(--transition);min-height:100vh;overflow-x:hidden}
.topnav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;padding:0 32px;gap:24px;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:background var(--transition),border-color var(--transition)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(37,99,235,0.3)}
.logo-icon svg{width:16px;height:16px}
.logo-wordmark{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.02em;transition:color var(--transition)}
.logo-wordmark span{color:var(--accent)}
.nav-tabs{display:flex;align-items:center;gap:2px;margin-left:24px}
.nav-tab{font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;text-decoration:none;color:var(--text2);transition:all var(--transition);border:1px solid transparent}
.nav-tab:hover{color:var(--text);background:var(--accent-soft)}
.nav-tab.active{color:var(--accent);background:var(--accent-soft);border-color:var(--border-active)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.version-badge{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:100px;border:1px solid var(--border);color:var(--text3)}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--tag-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all var(--transition)}
.theme-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.theme-btn svg{width:14px;height:14px}
.i-sun{display:none}.i-moon{display:block}
[data-theme="light"] .i-sun{display:block}[data-theme="light"] .i-moon{display:none}

.diagram-wrap{padding-top:56px;display:flex;flex-direction:column;align-items:center}
.diagram-header{width:100%;max-width:1200px;padding:32px 32px 20px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.diagram-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.02em}
.diagram-sub{font-size:13px;color:var(--text2);margin-top:4px}
.legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:7px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text2)}
.leg-line{width:28px;height:2px;border-radius:1px}
.leg-solid{background:var(--d-accent)}
.leg-dashed{background:transparent;border-top:2px dashed var(--d-teal)}
.leg-dotted{background:transparent;border-top:2px dotted var(--d-text2)}

.svg-container{width:100%;max-width:1200px;padding:0 32px 64px;overflow:auto}
.svg-container svg{width:100%;height:auto;min-width:900px}

/* SVG text inherits font */
svg text{font-family:'DM Mono',monospace}
</style>
</head>
